services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: understand-mov-backend
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      DB_PATH: /app/data/db/search.db
      FRAMES_DIR: /app/data/frames
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m alembic upgrade head &&
      exec uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./data:/app/data
      - ${VIDEO_IMPORT_PATH:-./作弊视频}:/app/videos:ro
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_API_KEY: ${VITE_API_KEY}
    container_name: understand-mov-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
